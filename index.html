<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handwritten Digit Recognition Interface</title>
<style>
    body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        background-color: #f4f4f9;
        color: #1a1a1a;
    }
    .sidebar {
        width: 320px;
        padding: 20px;
        background: #ffffff;
        border-right: 1px solid #e0e0e0;
        box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
        gap: 20px;
        overflow: hidden;
    }
    .panel {
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 15px;
    }
    .form-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 14px;
    }
    .form-row input[type="number"] {
        width: 60px;
        padding: 4px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .checkbox-group {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 14px;
    }
    button {
        background-color: #000000;
        color: #ffffff;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        transition: background-color 0.2s;
    }
    button:hover {
        background-color: #333333;
    }
    .layer-controls {
        border: 1px dashed #cccccc;
        padding: 10px;
        border-radius: 6px;
    }
    .layer-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 8px 0;
        padding: 6px;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
    }
    .layer-item button {
        background-color: #d9534f;
        padding: 4px 8px;
        font-size: 12px;
    }
    .layer-item button:hover {
        background-color: #c9302c;
    }
    #networkContainer {
        flex: 1;
        min-height: 300px;
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        position: relative;
    }
    #networkCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .bottom-section {
        display: flex;
        height: 250px;
        gap: 20px;
    }
    .chart-panel {
        flex: 1;
        position: relative;
        display: flex;
        align-items: flex-end;
        padding: 20px;
    }
    .axes {
        width: 100%;
        height: 100%;
        border-left: 2px solid #000;
        border-bottom: 2px solid #000;
        position: relative;
    }
    .axes::before {
        content: 'Accuracy';
        position: absolute;
        top: 0;
        left: -20px;
        transform: rotate(-90deg);
        transform-origin: left top;
        font-size: 12px;
    }
    .axes::after {
        content: 'Epochs';
        position: absolute;
        bottom: -20px;
        right: 0;
        font-size: 12px;
    }
    .testing-panel {
        width: 400px;
        display: flex;
        gap: 20px;
    }
    .canvas-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }
    #digitCanvas {
        border: 2px solid #000000;
        background-color: #ffffff;
        cursor: crosshair;
        touch-action: none;
    }
    .prediction-wrapper {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        gap: 15px;
    }
    .prediction-text {
        font-size: 18px;
    }
    #predictionResult {
        font-size: 32px;
        font-weight: bold;
        color: #007bff;
    }
</style>
</head>
<body>

<div class="sidebar">
    <div class="panel">
        <div class="checkbox-group">
            <label><input type="checkbox" id="dropoutCheck"> Dropout</label>
            <label><input type="checkbox" id="regCheck"> Regularization</label>
        </div>
        <div class="form-row">
            <span>Dropout rate:</span>
            <input type="number" step="0.1" value="0.2" id="dropoutRate">
        </div>
        <div class="form-row">
            <span>Epochs:</span>
            <input type="number" value="10" id="epochs">
        </div>
        <div class="form-row">
            <span>Learning rate:</span>
            <input type="number" step="0.001" value="0.001" id="lr">
        </div>
        <div class="form-row">
            <span>Batch Size:</span>
            <input type="number" value="32" id="batchSize">
        </div>
        <div class="form-row">
            <span>Reg. parameter &lambda;:</span>
            <input type="number" step="0.01" value="0.01" id="regParam">
        </div>
    </div>

    <div class="panel layer-controls">
        <div class="form-row" style="font-weight: bold;">
            <span>Input:</span>
            <span>784 x 1</span>
        </div>
        <div id="dynamicLayers"></div>
        <div class="form-row" style="font-weight: bold;">
            <span>Output:</span>
            <span>10 x 1</span>
        </div>
        <button id="addLayerBtn" style="width: 100%; margin-top: 10px; background-color: #28a745;">+ Add another layer</button>
    </div>

    <div class="panel" style="text-align: center;">
        <button id="trainBtn" style="width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px;">Train Network</button>
        <div style="font-size: 18px;">Test Accuracy: <span id="accuracyDisplay" style="font-weight: bold;">--%</span></div>
    </div>
</div>

<div class="main-content">
    <div id="networkContainer">
        <canvas id="networkCanvas"></canvas>
    </div>

    <div class="bottom-section">
        <div class="panel chart-panel">
            <div class="axes"></div>
        </div>

        <div class="panel testing-panel">
            <div class="canvas-wrapper">
                <span style="font-weight: bold;">Draw a digit</span>
                <canvas id="digitCanvas" width="140" height="140"></canvas>
                <button id="clearBtn">Clear</button>
            </div>
            <div class="prediction-wrapper">
                <button id="predictBtn" style="padding: 12px 24px; font-size: 16px; background-color: #007bff;">Predict</button>
                <div class="prediction-text">
                    Prediction is: <br>
                    <span id="predictionResult">[]</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const networkCanvas = document.getElementById('networkCanvas');
    const netCtx = networkCanvas.getContext('2d');
    const digitCanvas = document.getElementById('digitCanvas');
    const digitCtx = digitCanvas.getContext('2d');
    const dynamicLayersContainer = document.getElementById('dynamicLayers');
    const predictionResult = document.getElementById('predictionResult');
    
    let architecture = [784, 128, 64, 10];
    let isDrawing = false;
    let predictionInterval;

    function resizeCanvas() {
        const rect = networkCanvas.parentElement.getBoundingClientRect();
        networkCanvas.width = rect.width;
        networkCanvas.height = rect.height;
        drawNetworkVisualization();
    }

    window.addEventListener('resize', resizeCanvas);

    function updateLayerUI() {
        dynamicLayersContainer.innerHTML = '';
        for (let i = 1; i < architecture.length - 1; i++) {
            const row = document.createElement('div');
            row.className = 'layer-item';
            
            const labelContainer = document.createElement('div');
            labelContainer.textContent = `Layer ${i}: `;
            
            const sizeInput = document.createElement('input');
            sizeInput.type = 'number';
            sizeInput.value = architecture[i];
            sizeInput.style.width = '60px';
            sizeInput.onchange = (e) => {
                architecture[i] = parseInt(e.target.value) || 1;
                drawNetworkVisualization();
            };

            const removeBtn = document.createElement('button');
            removeBtn.textContent = 'X';
            removeBtn.onclick = () => {
                architecture.splice(i, 1);
                updateLayerUI();
                drawNetworkVisualization();
            };

            labelContainer.appendChild(sizeInput);
            labelContainer.appendChild(document.createTextNode(' nodes'));
            row.appendChild(labelContainer);
            row.appendChild(removeBtn);
            dynamicLayersContainer.appendChild(row);
        }
    }

    document.getElementById('addLayerBtn').addEventListener('click', () => {
        architecture.splice(architecture.length - 1, 0, 32);
        updateLayerUI();
        drawNetworkVisualization();
    });

    function drawNetworkVisualization() {
        netCtx.clearRect(0, 0, networkCanvas.width, networkCanvas.height);
        
        const paddingX = 60;
        const paddingY = 40;
        const width = networkCanvas.width - paddingX * 2;
        const height = networkCanvas.height - paddingY * 2;
        
        const layerPositions = [];
        
        for (let i = 0; i < architecture.length; i++) {
            const layerSize = architecture[i];
            const maxVisualNodes = 8;
            const nodesToDraw = Math.min(layerSize, maxVisualNodes);
            const x = paddingX + (i * (width / Math.max(1, architecture.length - 1)));
            const nodesX = [];
            
            for (let j = 0; j < nodesToDraw; j++) {
                const y = paddingY + (j * (height / Math.max(1, nodesToDraw - 1)));
                nodesX.push({ x, y });
            }
            
            layerPositions.push(nodesX);
            
            if (layerSize > maxVisualNodes) {
                netCtx.fillStyle = '#000';
                netCtx.font = '24px Arial';
                netCtx.textAlign = 'center';
                netCtx.fillText('⋮', x, networkCanvas.height / 2 + 10);
            }
        }
        
        netCtx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
        netCtx.lineWidth = 1;
        
        for (let i = 0; i < layerPositions.length - 1; i++) {
            const currentLayer = layerPositions[i];
            const nextLayer = layerPositions[i + 1];
            
            for (let nodeA of currentLayer) {
                for (let nodeB of nextLayer) {
                    netCtx.beginPath();
                    netCtx.moveTo(nodeA.x, nodeA.y);
                    netCtx.lineTo(nodeB.x, nodeB.y);
                    netCtx.stroke();
                }
            }
        }
        
        netCtx.fillStyle = '#ffffff';
        netCtx.strokeStyle = '#000000';
        netCtx.lineWidth = 2;
        
        for (let layer of layerPositions) {
            for (let node of layer) {
                netCtx.beginPath();
                netCtx.arc(node.x, node.y, 12, 0, Math.PI * 2);
                netCtx.fill();
                netCtx.stroke();
            }
        }
    }

    digitCtx.lineWidth = 12;
    digitCtx.lineCap = 'round';
    digitCtx.strokeStyle = '#000000';

    function getMousePos(evt) {
        const rect = digitCanvas.getBoundingClientRect();
        if (evt.touches && evt.touches.length > 0) {
            return {
                x: evt.touches[0].clientX - rect.left,
                y: evt.touches[0].clientY - rect.top
            };
        }
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    function startPosition(e) {
        e.preventDefault();
        isDrawing = true;
        const pos = getMousePos(e);
        digitCtx.beginPath();
        digitCtx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getMousePos(e);
        digitCtx.lineTo(pos.x, pos.y);
        digitCtx.stroke();
    }

    function endPosition() {
        isDrawing = false;
        digitCtx.beginPath();
    }

    digitCanvas.addEventListener('mousedown', startPosition);
    digitCanvas.addEventListener('mousemove', draw);
    digitCanvas.addEventListener('mouseup', endPosition);
    digitCanvas.addEventListener('mouseout', endPosition);

    digitCanvas.addEventListener('touchstart', startPosition);
    digitCanvas.addEventListener('touchmove', draw);
    digitCanvas.addEventListener('touchend', endPosition);

    document.getElementById('clearBtn').addEventListener('click', () => {
        digitCtx.clearRect(0, 0, digitCanvas.width, digitCanvas.height);
        clearInterval(predictionInterval);
        predictionResult.textContent = '[]';
    });

    document.getElementById('predictBtn').addEventListener('click', () => {
        clearInterval(predictionInterval);
        predictionInterval = setInterval(() => {
            predictionResult.textContent = Math.floor(Math.random() * 10);
        }, 50);

        setTimeout(() => {
            clearInterval(predictionInterval);
            predictionResult.textContent = Math.floor(Math.random() * 10);
        }, 1200);
    });

    updateLayerUI();
    setTimeout(resizeCanvas, 0);
</script>
</body>
</html>
