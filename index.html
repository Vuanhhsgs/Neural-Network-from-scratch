<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Dashboard</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333 }
        .section { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px }
        .row { display: flex; gap: 20px; margin-bottom: 15px }
        .input-group { flex: 1; display: flex; flex-direction: column }
        label { font-weight: bold; margin-bottom: 5px }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold }
        button:hover { background: #0056b3 }
        #canvas { border: 2px solid #333; background: black; cursor: crosshair }
        .block-config { border-left: 4px solid #007bff; padding-left: 15px; margin-bottom: 10px }
    </style>
</head>
<body>

    <h1>Neural Network Playground</h1>

    <div class="section">
        <h2>1. Model Hyperparameters</h2>
        <div class="row">
            <div class="input-group">
                <label for="lr">Learning Rate</label>
                <input type="number" id="lr" value="0.01" step="0.001">
            </div>
            <div class="input-group">
                <label for="dropout">Dropout Rate</label>
                <input type="number" id="dropout" value="0.2" step="0.05" min="0" max="0.5">
            </div>
            <div class="input-group">
                <label for="epochs">Epochs</label>
                <input type="number" id="epochs" value="10" min="1">
            </div>
        </div>

        <h3>Layer Blocks</h3>
        <div class="input-group" style="margin-bottom: 15px">
            <label for="blockCount">Number of Blocks</label>
            <input type="number" id="blockCount" value="1" min="1" max="5" onchange="updateBlockInputs()">
        </div>
        
        <div id="blocksContainer"></div>
        
        <button onclick="startTraining()" style="margin-top: 15px">Train Model</button>
        <div id="status" style="margin-top: 10px; font-weight: bold">Status: Loading Python runtime</div>
    </div>

    <div class="section">
        <h2>2. Live Model Test</h2>
        <p>Draw a single digit from 0 to 9 inside the box below.</p>
        <div class="row">
            <canvas id="canvas" width="280" height="280"></canvas>
            <div class="input-group" style="justify-content: center">
                <button onclick="clearCanvas()" style="background: #6c757d; margin-bottom: 10px">Clear Box</button>
                <button onclick="predictDigit()">Predict Number</button>
                <h3 id="predictionResult" style="margin-top: 20px; text-align: center">Prediction: None</h3>
            </div>
        </div>
    </div>

    <script>
        let pyodideModule
        const canvas = document.getElementById('canvas')
        const ctx = canvas.getContext('2d')
        let isDrawing = false

        ctx.lineWidth = 16
        ctx.lineCap = 'round'
        ctx.strokeStyle = 'white'

        canvas.addEventListener('mousedown', () => isDrawing = true)
        canvas.addEventListener('mouseup', () => isDrawing = false)
        canvas.addEventListener('mousemove', draw)

        function draw(e) {
            if (!isDrawing) return
            const rect = canvas.getBoundingClientRect()
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top)
            ctx.stroke()
            ctx.beginPath()
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top)
        }

        function clearCanvas() {
            ctx.fillRect(0, 0, canvas.width, canvas.height)
            ctx.beginPath()
            document.getElementById('predictionResult').innerText = "Prediction: None"
        }

        ctx.fillStyle = 'black'
        ctx.fillRect(0, 0, canvas.width, canvas.height)

        function updateBlockInputs() {
            const count = document.getElementById('blockCount').value
            const container = document.getElementById('blocksContainer')
            container.innerHTML = ''
            
            for (let i = 0; i < count; i++) {
                container.innerHTML += `
                    <div class="block-config">
                        <h4>Block ${i + 1}</h4>
                        <div class="row">
                            <div class="input-group">
                                <label>Neurons (Width)</label>
                                <input type="number" class="block-width" value="256" min="1">
                            </div>
                            <div class="input-group">
                                <label>Layers (Depth)</label>
                                <input type="number" class="block-depth" value="5" min="1">
                            </div>
                        </div>
                    </div>
                `
            }
        }
        updateBlockInputs()

        async function loadEnvironment() {
            try {
                pyodideModule = await loadPyodide()
                await pyodideModule.loadPackage("numpy")
                document.getElementById('status').innerText = "Status: Ready to train."
                
                const response = await fetch('network.py')
                const pythonCode = await response.text()
                pyodideModule.runPython(pythonCode)
            } catch (err) {
                document.getElementById('status').innerText = "Status: Error loading environment."
                console.error(err)
            }
        }
        loadEnvironment()

        async function startTraining() {
            document.getElementById('status').innerText = "Status: Running calculations..."
            
            const lr = document.getElementById('lr').value
            const dropout = document.getElementById('dropout').value
            const epochs = document.getElementById('epochs').value
            
            const widths = Array.from(document.querySelectorAll('.block-width')).map(i => parseInt(i.value))
            const depths = Array.from(document.querySelectorAll('.block-depth')).map(i => parseInt(i.value))
            
            let hiddenLayers = []
            for (let i = 0; i < widths.length; i++) {
                for (let j = 0; j < depths[i]; j++) {
                    hiddenLayers.push(widths[i])
                }
            }

            pyodideModule.globals.set("ui_lr", parseFloat(lr))
            pyodideModule.globals.set("ui_dropout", parseFloat(dropout))
            pyodideModule.globals.set("ui_epochs", parseInt(epochs))
            pyodideModule.globals.set("ui_hidden_layers", pyodideModule.toPy(hiddenLayers))

            setTimeout(() => {
                const accuracy = pyodideModule.runPython("trigger_training(ui_hidden_layers, ui_lr, ui_dropout, ui_epochs)")
                document.getElementById('status').innerText = `Status: Training complete. Test Accuracy: ${accuracy}%`
            }, 50)
        }

        function predictDigit() {
            const tempCanvas = document.createElement('canvas')
            tempCanvas.width = 28
            tempCanvas.height = 28
            const tempCtx = tempCanvas.getContext('2d')
            tempCtx.drawImage(canvas, 0, 0, 28, 28)
            
            const imgData = tempCtx.getImageData(0, 0, 28, 28)
            const pixels = imgData.data
            let grayscalePixels = []
            
            for (let i = 0; i < pixels.length; i += 4) {
                grayscalePixels.push(pixels[i])
            }

            pyodideModule.globals.set("ui_image_pixels", pyodideModule.toPy(grayscalePixels))
            const prediction = pyodideModule.runPython("trigger_prediction(ui_image_pixels)")
            document.getElementById('predictionResult').innerText = `Prediction: ${prediction}`
        }
    </script>
</body>
</html>
